# See https://pre-commit.com for more information
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Lint (backend)
        entry: bash -c 'cd backend && uv run ruff check --fix "${@#backend/}"' --
        language: system
        types: [python]
        files: ^backend/
        stages: [pre-commit]

      - id: ruff-format
        name: Ruff Format (backend)
        entry: bash -c 'cd backend && uv run ruff format "${@#backend/}"' --
        language: system
        types: [python]
        files: ^backend/
        stages: [pre-commit]

      - id: eslint
        name: ESLint (frontend)
        entry: bash -c 'cd frontend && npx eslint --fix "${@#frontend/}"' --
        language: system
        types_or: [javascript, jsx, ts, tsx]
        files: ^frontend/src/
        stages: [pre-commit]

      - id: tsc
        name: TypeScript Type Check (frontend)
        entry: bash -c 'cd frontend && npx tsc -b --noEmit'
        language: system
        types_or: [ts, tsx]
        files: ^frontend/
        pass_filenames: false
        stages: [pre-commit]
